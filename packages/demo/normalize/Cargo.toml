[package]
name = "trust402-demo-normalize"
version = "0.0.1"
description = "Minimal financial data normalization module for the Trust402 demo"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"
